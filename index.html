<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bot BTC Trend-Following — Panel</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --border:#272e3a; --txt:#e6edf3; --dim:#8b949e;
    --green:#2ea043; --greenbg:#12261a; --red:#da3633; --amber:#d29922; --accent:#58a6ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:16px;max-width:900px;margin:0 auto}
  h1{font-size:18px;margin:0 0 2px}
  .sub{color:var(--dim);font-size:13px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
  .status{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .badge{font-size:15px;font-weight:700;padding:8px 16px;border-radius:999px}
  .badge.cash{background:#21262d;color:var(--dim)}
  .badge.long{background:var(--greenbg);color:var(--green);border:1px solid var(--green)}
  .equity{font-size:34px;font-weight:800;letter-spacing:-.5px}
  .ret{font-size:16px;font-weight:700}
  .pos{color:var(--green)} .neg{color:var(--red)} .flat{color:var(--dim)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .metric{background:#0f141b;border:1px solid var(--border);border-radius:10px;padding:12px}
  .metric .k{color:var(--dim);font-size:12px;margin-bottom:4px}
  .metric .v{font-size:18px;font-weight:700}
  .lbl{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border)}
  th{color:var(--dim);font-weight:600}
  .muted{color:var(--dim);font-size:13px}
  .foot{color:var(--dim);font-size:12px;text-align:center;margin-top:8px}
  a{color:var(--accent);text-decoration:none}
  .reload{background:#21262d;color:var(--txt);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  .reload:active{background:#30363d}
  svg{width:100%;display:block}
  #btcchart{height:300px} #chart{height:170px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--green);margin-right:6px;vertical-align:middle}
  .tf{background:#21262d;color:var(--dim);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer;margin-left:4px}
  .tf.on{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:700}
</style>
</head>
<body>
  <h1>🤖 Bot BTC Trend-Following <span style="font-weight:400;color:var(--dim)">(paper)</span></h1>
  <div class="sub"><span class="dot"></span><span id="freshness">cargando…</span> · <button class="reload" onclick="load(true)">↻ Actualizar</button></div>

  <div class="card">
    <div class="status">
      <span id="badge" class="badge cash">…</span>
      <div>
        <div id="equity" class="equity">—</div>
        <div id="ret" class="ret flat">—</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="grid">
      <div class="metric"><div class="k">Precio BTC</div><div class="v" id="price">—</div></div>
      <div class="metric"><div class="k">Media 100 días (SMA)</div><div class="v" id="sma">—</div></div>
      <div class="metric"><div class="k">Distancia a la media</div><div class="v" id="gap">—</div></div>
      <div class="metric"><div class="k">Saldo en USDT</div><div class="v" id="balance">—</div></div>
    </div>
    <p class="muted" id="reason" style="margin:12px 0 0">—</p>
  </div>

  <div class="card">
    <div class="lbl">
      <span>BTC/USDT — velas</span>
      <span>
        <button class="tf" data-i="1d" data-l="120" onclick="setTf(this)">1D</button>
        <button class="tf on" data-i="4h" data-l="120" onclick="setTf(this)">4H</button>
        <button class="tf" data-i="1h" data-l="120" onclick="setTf(this)">1H</button>
      </span>
    </div>
    <svg id="btcchart" viewBox="0 0 800 300" preserveAspectRatio="none"></svg>
    <div class="muted" id="btcnote"></div>
  </div>

  <div class="card">
    <div class="lbl"><span>Tu curva de equity (inicio $1,000)</span></div>
    <svg id="chart" viewBox="0 0 600 170" preserveAspectRatio="none"></svg>
    <div class="muted" id="chartnote"></div>
  </div>

  <div class="card">
    <div class="lbl"><span>Operaciones</span></div>
    <div id="trades"><span class="muted">…</span></div>
  </div>

  <div class="foot">Se revisa solo cada 4 h en GitHub Actions · panel actualizado por el bot</div>

<script>
const $=id=>document.getElementById(id);
const money=n=>"$"+Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const KHOSTS=["https://data-api.binance.vision","https://api.binance.com"];
let TF={i:"4h",l:120};

async function fetchText(f){const r=await fetch(f+"?t="+Date.now());if(!r.ok)throw new Error(f+" "+r.status);return r.text();}
async function klines(sym,interval,limit){
  for(const h of KHOSTS){try{const r=await fetch(`${h}/api/v3/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);if(r.ok)return await r.json();}catch(e){}}
  throw new Error("sin klines");
}
function parseCSV(t){const l=t.trim().split(/\r?\n/);const h=l[0].split(",");return l.slice(1).map(r=>{const c=r.split(",");const o={};h.forEach((k,i)=>o[k]=c[i]);return o;});}
function ago(utc){const d=new Date(utc.replace(" UTC","Z").replace(" ","T"));const m=Math.round((Date.now()-d)/60000);if(m<1)return"hace segundos";if(m<60)return`hace ${m} min`;const h=Math.round(m/60);if(h<24)return`hace ${h} h`;return`hace ${Math.round(h/24)} d`;}

function setTf(btn){document.querySelectorAll(".tf").forEach(b=>b.classList.remove("on"));btn.classList.add("on");TF={i:btn.dataset.i,l:+btn.dataset.l};drawBtc();}

async function drawBtc(){
  const el=$("btcchart");
  try{
    // pedimos extra para calcular SMA100 en el tramo visible
    const kl=await klines("BTCUSDT",TF.i,Math.min(1000,TF.l+100));
    const closes=kl.map(k=>+k[4]);
    const smaAt=i=>{if(i<99)return null;let s=0;for(let j=i-99;j<=i;j++)s+=closes[j];return s/100;};
    const N=kl.length, start=Math.max(0,N-TF.l);
    const view=[];for(let i=start;i<N;i++)view.push({o:+kl[i][1],h:+kl[i][2],l:+kl[i][3],c:+kl[i][4],sma:smaAt(i)});
    let lo=Infinity,hi=-Infinity;view.forEach(d=>{lo=Math.min(lo,d.l);hi=Math.max(hi,d.h);if(d.sma!=null){lo=Math.min(lo,d.sma);hi=Math.max(hi,d.sma);}});
    const W=800,H=300,pT=10,pB=8,pL=6,pR=58,rng=(hi-lo)||1;
    const slot=(W-pL-pR)/view.length, cw=Math.max(1.5,slot*0.7);
    const cx=i=>pL+i*slot+slot/2, y=v=>pT+(hi-v)/rng*(H-pT-pB);
    let s="";
    // linea SMA100
    let pts=[];view.forEach((d,i)=>{if(d.sma!=null)pts.push(cx(i)+","+y(d.sma));});
    if(pts.length>1)s+=`<polyline points="${pts.join(" ")}" fill="none" stroke="#d29922" stroke-width="1.5"/>`;
    // velas
    view.forEach((d,i)=>{const up=d.c>=d.o,col=up?"#2ea043":"#da3633",X=cx(i);
      s+=`<line x1="${X}" y1="${y(d.h)}" x2="${X}" y2="${y(d.l)}" stroke="${col}" stroke-width="1"/>`;
      const yo=y(d.o),yc=y(d.c);s+=`<rect x="${X-cw/2}" y="${Math.min(yo,yc)}" width="${cw}" height="${Math.max(1,Math.abs(yo-yc))}" fill="${col}"/>`;});
    // etiquetas de precio (max, min, ultimo)
    const last=view[view.length-1].c;
    [[hi,"#8b949e"],[lo,"#8b949e"],[last,"#e6edf3"]].forEach(([v,c])=>{
      s+=`<line x1="${pL}" y1="${y(v)}" x2="${W-pR}" y2="${y(v)}" stroke="#21262d" stroke-width="1"/>`;
      s+=`<text x="${W-pR+4}" y="${y(v)+4}" fill="${c}" font-size="12">$${Math.round(v).toLocaleString()}</text>`;});
    el.innerHTML=s;
    $("btcnote").innerHTML='🟠 Línea naranja = media de 100 días. El bot <b>compra</b> cuando el precio cierra por <b>encima</b> de la línea, y pasa a <b>CASH</b> cuando cae por debajo.';
  }catch(e){el.innerHTML="";$("btcnote").textContent="No se pudo cargar el gráfico de BTC desde esta red.";}
}

async function load(manual){
  if(manual){$("freshness").textContent="actualizando…";}
  try{
    const s=JSON.parse(await fetchText("status.json"));
    $("freshness").textContent="Última revisión "+ago(s.updated_utc);
    const isLong=s.position==="LONG";
    $("badge").className="badge "+(isLong?"long":"cash");
    $("badge").textContent=isLong?"● COMPRADO (LONG)":"○ EN CASH (fuera)";
    $("equity").textContent=money(s.equity);
    const ret=(s.equity/s.start_capital-1)*100;
    $("ret").textContent=(ret>=0?"+":"")+ret.toFixed(2)+"% desde el inicio";
    $("ret").className="ret "+(ret>0.001?"pos":ret<-0.001?"neg":"flat");
    $("price").textContent=money(s.price);
    $("sma").textContent=money(s.sma100);
    const gap=(s.price/s.sma100-1)*100;
    $("gap").textContent=(gap>=0?"+":"")+gap.toFixed(1)+"% "+(gap>=0?"↑ (compra)":"↓ (cash)");
    $("gap").className="v "+(gap>=0?"pos":"neg");
    $("balance").textContent=money(s.balance_usdt);
    $("reason").textContent=s.reason;
  }catch(e){$("freshness").textContent="esperando primeros datos del bot…";}
  try{const eq=parseCSV(await fetchText("equity_history.csv")).map(r=>+r.equity).filter(n=>!isNaN(n));drawEquity(eq);}
  catch(e){$("chartnote").textContent="La curva aparece cuando el bot lleve un par de días registrando.";}
  try{
    const tr=parseCSV(await fetchText("paper_trades.csv")).reverse();
    if(!tr.length)throw 0;
    let h="<table><tr><th>Fecha</th><th>Acción</th><th>Precio</th><th>PnL</th></tr>";
    tr.forEach(t=>{const pnl=t.pnl_pct?(t.pnl_pct+"%"):"—";const cl=t.pnl_pct?(parseFloat(t.pnl_pct)>=0?"pos":"neg"):"";
      h+=`<tr><td>${t.fecha_utc.replace(" UTC","")}</td><td>${t.accion}</td><td>${money(t.precio)}</td><td class="${cl}">${pnl}</td></tr>`;});
    $("trades").innerHTML=h+"</table>";
  }catch(e){$("trades").innerHTML='<span class="muted">Sin operaciones todavía. El bot está esperando que BTC supere su media de 100 días para comprar.</span>';}
  drawBtc();
}
function drawEquity(v){
  const svg=$("chart");svg.innerHTML="";
  if(v.length<2){$("chartnote").textContent="La curva se dibuja cuando haya al menos 2 puntos (1 por día).";return;}
  $("chartnote").textContent="";
  const W=600,H=170,pad=6,mn=Math.min(...v,1000),mx=Math.max(...v,1000),rng=(mx-mn)||1;
  const x=i=>pad+i*(W-2*pad)/(v.length-1),y=n=>H-pad-(n-mn)/rng*(H-2*pad),yb=y(1000);
  svg.innerHTML+=`<line x1="0" y1="${yb}" x2="${W}" y2="${yb}" stroke="#3d444d" stroke-dasharray="4 4" stroke-width="1"/>`;
  const last=v[v.length-1],col=last>=1000?"#2ea043":"#da3633";
  svg.innerHTML+=`<polyline points="${v.map((n,i)=>x(i)+","+y(n)).join(" ")}" fill="none" stroke="${col}" stroke-width="2"/>`;
  svg.innerHTML+=`<circle cx="${x(v.length-1)}" cy="${y(last)}" r="3.5" fill="${col}"/>`;
}
load();
setInterval(()=>load(false),300000);
</script>
</body>
</html>
